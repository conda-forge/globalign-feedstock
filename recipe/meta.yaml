{% set name = "globalign" %}
{% set version = "0.1.16" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/globalign-{{ version }}.tar.gz
  sha256: 40d46a15d6ab1da5978406da1b35b339a7b6d9600e21b7ac2d5bda420a6530aa

build:
  entry_points:
    - globaligner = globalign.globaligner:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - globalign
  commands:
    - pip check
    - globaligner --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/iamgiddyaboutgit/globalign
  summary: Global Sequence Alignment
  doc_url: https://iamgiddyaboutgit.github.io/globalign/
  dev_url: https://github.com/iamgiddyaboutgit/globalign
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - iamgiddyaboutgit
